<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>So sánh tính năng HUBI và LiMiVN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                500: "#2563eb",
                600: "#1d4ed8",
                700: "#1e40af",
              },
              accent: {
                500: "#7c3aed",
                600: "#6d28d9",
              },
            },
            boxShadow: {
              soft: "0 10px 30px rgba(15, 23, 42, 0.08)",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-slate-100 text-slate-800">
    <main class="mx-auto min-h-screen max-w-7xl px-4 py-6 sm:px-6 sm:py-8 lg:px-8 lg:py-10">
      <section id="comparison" class="rounded-3xl bg-white p-4 shadow-soft sm:p-6">
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.2em] text-brand-600">
            Bảng tổng hợp
          </p>
          <h1 class="mt-2 text-2xl font-semibold text-slate-900 sm:text-3xl">
            So sánh tính năng HUBI và LiMiVN
          </h1>
        </div>

        <div id="comparison-mobile" class="mt-5 space-y-4 md:hidden"></div>

        <div class="mt-5 hidden overflow-hidden rounded-2xl border border-slate-200 md:block">
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200">
              <thead class="bg-slate-50">
                <tr class="text-left text-sm font-semibold text-slate-700">
                  <th class="px-4 py-4">Tính năng</th>
                  <th class="px-4 py-4">LiMiVN</th>
                  <th class="px-4 py-4">HUBI</th>
                </tr>
              </thead>
              <tbody id="comparison-body" class="divide-y divide-slate-200 bg-white"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="mt-6 rounded-3xl bg-white p-4 shadow-soft sm:mt-8 sm:p-6">
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.2em] text-brand-600">
            Luồng tài xế
          </p>
          <h2 class="mt-2 text-xl font-semibold text-slate-900 sm:text-2xl">
            So sánh theo trải nghiệm tài xế
          </h2>
        </div>

        <div
          id="system-cards"
          class="mt-5 grid gap-4 lg:grid-cols-2 lg:gap-6"
        ></div>
      </section>

      <section class="mt-6 rounded-3xl bg-white p-4 shadow-soft sm:mt-8 sm:p-6">
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.2em] text-brand-600">
            LiMiVN bổ sung
          </p>
          <h2 class="mt-2 text-2xl font-semibold text-slate-900">
            Tính năng LiMiVN có nhưng HUBI chưa có
          </h2>
        </div>

        <div
          id="limi-extra-features"
          class="mt-5 grid gap-4 md:grid-cols-2 xl:grid-cols-3 xl:gap-6"
        ></div>
      </section>

      <section class="mt-6 rounded-3xl bg-white p-4 shadow-soft sm:mt-8 sm:p-6">
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.2em] text-brand-600">
            HUBI nổi bật hơn
          </p>
          <h2 class="mt-2 text-2xl font-semibold text-slate-900">
            Nghiệp vụ chành xe
          </h2>
        </div>

        <div
          id="hubi-extra-features"
          class="mt-5 grid gap-4 md:grid-cols-2 md:gap-6"
        ></div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
  </html>
